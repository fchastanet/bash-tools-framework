---
$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json
version: "0.2"
language: en
noConfigSearch: true
caseSensitive: true
useGitignore: true
enableGlobDot: true
ignorePaths:
  - .git/**
  - '**/.git/**'
  - '**/node_modules/**'
  - .history/**
  - logs/**
  - '**/logs/**'
  - bin/**
  - '**/bin/**'
  - '**/testsData/**'
  - package-lock.json
  - '**/*.svg'
  - .vscode
  - .cspell/**
  - report
  - .jscpd.json
  - megalinter-reports
  - '*-megalinter_file_names_cspell.txt'
  - '**/*megalinter_file_names_cspell.txt'
  - .shellcheckrc
  - vendor/**
  - '**/backup/**'
  - commit-msg.md
  - .mega-linter*.yml
  - TODO.md
  - .env
dictionaryDefinitions:
  - name: forbidden
    addWords: false
    path: .cspell/forbidden.txt
  - name: myBash
    path: .cspell/bash.txt
    addWords: true
  - name: githubWorkflow
    path: .cspell/githubWorkflow.txt
    addWords: true
  - name: config
    path: .cspell/config.txt
    addWords: true
  - name: mySoftwares
    path: .cspell/softwares.txt
    addWords: true
  - name: markdown
    path: .cspell/markdown.txt
    addWords: true
  - name: lintersConfig
    path: .cspell/lintersConfig.txt
    addWords: true
  # Specific dictionaries for this repo
  - name: plantuml
    path: .cspell/plantuml.txt
    addWords: false
  - name: myAwk
    path: .cspell/myAwk.txt
    addWords: true
  - name: dirColors
    path: .cspell/dirColors.txt
    addWords: false
  - name: loremIpsum
    path: .cspell/loremIpsum.txt
    addWords: true

languageSettings:
  - languageId: githubWorkflow
    locale: '*'
    dictionaries:
      - githubWorkflow
      - bash
      - go
      - myBash
      - mySoftwares
      - software
  - languageId: config
    locale: '*'
    caseSensitive: true
    dictionaries:
      - config
      - mySoftwares
      - software
  - languageId: shellscript
    locale: '*'
    dictionaries:
      - bash
      - myBash
      - mySoftwares
      - software

  - languageId: markdown
    locale: '*'
    dictionaries:
      - markdown
      - mySoftwares
      - softwareTerms

  # Specific language settings for this repo
  - languageId: dirColors
    locale: '*'
    dictionaries:
      - dirColors
# ----------
overrides:
  - filename:
      - '.*'
      - '*.yml'
      - '*.yaml'
      - 'configs/site-config.yaml'
      - '*.toml'
      - 'package.json'
    languageId: config
  - filename:
      - .github/**/*.yml
      - .github/*.yml
      - templates-examples/**
    languageId: githubWorkflow
  - filename:
      - '*.yml'
      - '*.yaml'
      - '*.toml'
    dictionaries:
      - lintersConfig
  - filename:
      - LICENSE
      - '**/*.md'
      - '**/*-help.txt'
    languageId: markdown
  - filename:
    - '**/*.puml'
    dictionaries:
      - plantuml
  - filename: '**/*.html'
    dictionaries:
      - mySoftwares
      - software

  # Specific overrides for this repo
  - languageId: shellscript
    filename:
      - '**/*.sh'
      - '*.bash'
      - .github/copilot-instructions.md
      - '*.{yaml,yml}'
      - '**/*.bats'
      - '**/*.env'
      - '.env.*'
      - '.docker/**'
      - src/Array/wrap.sh
      - src/_binaries/ShellBash/conf/home/.Xresources
      - src/_binaries/GitDefaultConfig/conf/home/.config/tig/config
      - src/_binaries/GitDefaultConfig/conf/home/.gitconfig
      - src/_binaries/GitDefaultConfig/conf/home/.tigrc
    dictionaries:
      - config
  - filename:
      - 'src/Array/wrap*.bats'
    dictionaries:
      - loremIpsum
  - filename: bash-tools-framework-schema.json
    dictionaries:
      - mySoftwares
      - software
  - filename: '**/*.awk'
    dictionaries:
      - myAwk
      - mySoftwares
      - software

patterns:
  - name: urls
    pattern: "/https?://([^ \t\"'()]+)/g"
  - name: packages
    pattern: /[-A-Za-z0-9.]+/[-A-Za-z0-9.]+/g
  - name: markdownToc
    pattern: \]\(#[^)]+\)$
ignoreRegExpList:
  - urls
  - packages
  - markdownToc
enableFiletypes:
  - shellscript

dictionaries:
  - forbidden
