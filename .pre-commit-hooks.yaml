---
- id: fixShebangExecutionBit
  name: fixShebangExecutionBit
  description: |
    Find all files containing a shebang and
    mark them as executable if not yet
  language: script
  entry: bin/findShebangFiles
  args: [chmod, +x]
  pass_filenames: false
  types: ["file", "shell", "text"]
  always_run: true
  stages: [pre-commit, manual]

- &FRAMEWORK_LINT
  id: frameworkLint
  name: Bash Framework Lint
  description: |
    Check if your files uses the right syntax
    for using bash-tools-framework
  language: script
  entry: bin/frameworkLint
  args: [--expected-warnings-count, "0", --format, plain, --theme, default-force]
  pass_filenames: false
  types: ["executable", "file", "shell", "text"]
  always_run: false
  stages: [pre-commit]

- <<: *FRAMEWORK_LINT
  id: frameworkLintGithubAction
  name: Bash Framework Lint for Github Actions
  args: [--expected-warnings-count, "0", --format, checkstyle, --theme, noColor]
  log_file: logs/frameworkLint.xml
  stages: [manual]

- id: awkLint
  name: awk Lint
  description: Lint awk files using awk.
  language: script
  entry: bin/awkLint
  args: []
  log_file: logs/awkLint.xml
  pass_filenames: false
  files: \.awk$
  always_run: false
  stages: [pre-commit, manual]

- &SHELLCHECK_LINT
  id: shellcheckLint
  name: shellcheck Lint
  description: |
    Lint bash files using shellcheck.
    Installing last version automatically
  language: script
  entry: bin/shellcheckLint
  args: [-f, tty, --xargs]
  pass_filenames: false
  always_run: true
  stages: [pre-commit]

- <<: *SHELLCHECK_LINT
  id: shellcheckLintGithubAction
  name: shellcheck Linter for Github Actions
  args: [-f, checkstyle, --xargs]
  log_file: logs/shellcheckLint.xml
  stages: [manual]

- id: runUnitTests
  name: Run unit tests
  description: run unit test using bats in docker isolated environment
  language: script
  entry: preCommitTest.sh
  args: ["scrasnups/build:bash-tools-ubuntu-5.3", -r, src, -j, "30"]
  pass_filenames: false
  always_run: true
  require_serial: true
  stages: [pre-commit]

- id: rimage
  name: Rimage Converter
  description: Convert and compress images using rimage
  language: system
  entry: bin/rimageWrapper
  args: [--ci, webp]
  pass_filenames: true
  types: ["file", "non-executable", "image"]
  always_run: false
  stages: [pre-commit]

- id: plantuml
  name: Plantuml Converter
  description: Convert plantuml files to images
  language: script
  entry: bin/plantuml
  args: [--ci, --same-dir, -f, png, -f, svg]
  pass_filenames: true
  types: ["file", "non-executable", "plantuml", "text"]
  always_run: false
  stages: [pre-commit, manual]

- id: mermaid
  name: Mermaid Converter
  description: Convert mermaid files to images
  language: script
  entry: bin/mermaid
  args: [--ci, --same-dir, --format, svg]
  types: ["file", "non-executable", "text"]
  always_run: false
  pass_filenames: true
  files: \.mmd$
  stages: [pre-commit, manual]

- id: kroki
  name: Kroki Converter
  description: Convert diagram files to images using Kroki
  language: script
  entry: bin/krokiWrapper
  args: [--ci, --same-dir, --format, svg]
  types: ["file", "non-executable", "text"]
  always_run: false
  pass_filenames: true
  files: \.(plantuml|puml|iuml|mmd|dot|gv|ditaa|erd|nomnoml|pikchr|svgbob|bob|umlet|uxf|vega|vegalite|vl|wavedrom|excalidraw|blockdiag|seqdiag|actdiag|nwdiag|packetdiag|rackdiag|bpmn|dmn|d2)$
  stages: [pre-commit, manual]

- id: hugoUpdateLastmod
  name: Hugo Update Lastmod
  description: Update lastmod field in Hugo frontmatter based on git modification date or current date.
  language: script
  entry: bin/hugoUpdateLastmod
  args: [--commit]
  pass_filenames: false
  always_run: true
  stages: [pre-commit]

- id: megalinterCheckVersion
  name: Megalinter Check Version
  description: Megalinter Check if new version is available
  language: script
  entry: bin/megalinter
  args: [--image, "oxsecurity/megalinter-terraform:v9", --check-megalinter-version]
  pass_filenames: false
  always_run: true
  stages: [pre-commit, manual]

- &MEGALINTER
  id: megalinter
  name: Megalinter
  description: use megalinter to check your project
  language: script
  entry: bin/megalinter
  args: [--image, "oxsecurity/megalinter-terraform:v9", --config-file, ".mega-linter-light.yml", --fix]
  pass_filenames: false
  require_serial: true
  always_run: true
  verbose: true
  stages: [pre-commit]

# manual stage used to select github action with megalinter full config
- <<: *MEGALINTER
  id: megalinterGithubAction
  name: Megalinter for Github Actions
  args: [--image, "oxsecurity/megalinter-terraform:v9", --config-file, ".mega-linter-githubAction.yml", --fix]
  stages: [manual]

- id: cspellForbidden
  name: cspell with support to Forbidden Words
  description: ensure .cspell/forbidden.txt exists and is used by cspell
  language: script
  entry: bin/cspellForbidden
  args: []
  pass_filenames: false
  always_run: true
  stages: [pre-commit, pre-push]
